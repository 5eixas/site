<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>

  <!-- Antenna -->
  <line x1="16" y1="2" x2="16" y2="6" stroke="#00ff78" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="1.5" r="1.5" fill="#00ff78"/>

  <!-- Head -->
  <rect x="7" y="6" width="18" height="13" rx="3" fill="#111" stroke="#00ff78" stroke-width="1"/>

  <!-- Left Eye -->
  <rect x="9" y="9" width="6" height="6" rx="1.5" fill="#050505" stroke="#00ff78" stroke-width="0.8"/>
  <rect x="10" y="10" width="4" height="2" rx="0.5" fill="#00ff78"/>

  <!-- Right Eye -->
  <rect x="17" y="9" width="6" height="6" rx="1.5" fill="#050505" stroke="#00ff78" stroke-width="0.8"/>
  <rect x="18" y="10" width="4" height="2" rx="0.5" fill="#00ff78"/>

  <!-- Mouth -->
  <rect x="10" y="16.5" width="12" height="2" rx="1" fill="#050505" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="11" y="17" width="2" height="1" rx="0.3" fill="#00ff78" opacity="0.8"/>
  <rect x="14" y="17" width="2" height="1" rx="0.3" fill="#00ff78" opacity="0.8"/>
  <rect x="17" y="17" width="2" height="1" rx="0.3" fill="#00ff78" opacity="0.8"/>

  <!-- Neck -->
  <rect x="13.5" y="19" width="5" height="3" rx="1" fill="#111"/>

  <!-- Body -->
  <rect x="6" y="22" width="20" height="14" rx="3" fill="#111" stroke="#00ff78" stroke-width="1"/>

  <!-- Chest screen -->
  <rect x="9" y="24.5" width="14" height="8" rx="2" fill="#050505" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="10" y="26" width="7" height="1.5" rx="0.5" fill="#00ff78" opacity="0.8"/>
  <rect x="10" y="28.5" width="4" height="1" rx="0.3" fill="#00ff78" opacity="0.4"/>

  <!-- Left Arm -->
  <rect x="1" y="23" width="4" height="9" rx="2" fill="#111" stroke="#1a1a1a" stroke-width="0.8"/>
  <!-- Right Arm -->
  <rect x="27" y="23" width="4" height="9" rx="2" fill="#111" stroke="#1a1a1a" stroke-width="0.8"/>
  <!-- Lightning in right hand -->
  <path d="M28.5 31 L27 34 L29 34 L28 37 L31 33 L29 33 Z" fill="#00ff78" transform="scale(0.7) translate(11, -8)"/>
</svg>
